name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install tools
        run: python -m pip install -r requirements.txt pyinstaller pillow

      - name: Generate icon
        run: python tools/make_icon.py

      - name: Test game
        run: python -m unittest discover -s tests -v

      - name: Build EXE
        run: python -m PyInstaller --noconfirm --clean HunterDuel.spec

      - name: Prepare game package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path portable/mods | Out-Null
          Copy-Item dist/HunterDuel.exe portable/HunterDuel.exe
          Copy-Item mods/README_MODY.txt portable/mods/README_MODY.txt
          Copy-Item mods/Przykladowa_Technika.huntermod.json portable/mods/Przykladowa_Technika.huntermod.json

      - uses: actions/upload-artifact@v4
        with:
          name: HunterDuel-Windows-Portable
          path: portable
